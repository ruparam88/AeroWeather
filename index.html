<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroWeather | Beautiful Forecasts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>AeroWeather</h1>
            <p>Your atmospheric insights, visualized.</p>
        </header>
        
        <div class="search-wrapper">
            <form id="search-form" class="search-bar">
                <input type="text" id="search-input" placeholder="Enter a city name..." autocomplete="off">
                <button type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
            <ul id="suggestions-list" class="suggestions-dropdown hidden"></ul>
        </div>

        <div id="error-message" class="hidden">City not found. Please try again.</div>

        <div id="weather-card" class="glass-card hidden-card">
            <div class="weather-info">
                <h2 id="location">Loading...</h2>
                <div class="temp-container">
                    <span id="temperature">--°C</span>
                </div>
                <div class="weather-desc" id="description">--</div>
                
                <div class="divider"></div>
                
                <div class="extra-info">
                    <div class="info-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        <span id="avg-temp">24h Avg: --°C</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="weatherAPI.js"></script>
</body>
</html>
